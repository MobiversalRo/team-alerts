app:
  id: ari:cloud:ecosystem::app/3883bfae-cc64-4179-a194-54985ffed17b
  runtime:
    name: nodejs20.x
  licensing:
    enabled: true

modules:
  jira:globalPage:
    - key: team-alerts-page
      resource: main
      title: Team Alerts
      icon: resource:app_icon;logo.svg
      resolver:
        function: resolver

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/team-alerts/build

  - key: app_icon
    path: static/team-alerts/build/images

permissions:
  scopes:
    - read:jira-user
    - read:jira-work
    - write:jira-work
    - write:comment:jira
    - send:notification:jira
    - storage:app
  content:
    styles:
      - 'unsafe-inline'
    scripts:
      - 'unsafe-inline'
