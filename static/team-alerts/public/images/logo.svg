  <!-- Bell top -->
  <rect x="47" y="15" width="6" height="5" rx="2" fill="#0052CC"/>
  
  <!-- Notification badge -->
  <circle cx="68" cy="28" r="10" fill="#FF5630"/>
  <text x="68" y="32" font-family="Arial, sans-serif" font-size="12" font-weight="bold" 
        fill="white" text-anchor="middle">3</text>
  
  <!-- Sound waves -->
  <path d="M75 45 Q78 50, 75 55" stroke="#2684FF" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M80 40 Q85 50, 80 60" stroke="#2684FF" stroke-width="2" fill="none" opacity="0.5"/>
  
  <path d="M25 45 Q22 50, 25 55" stroke="#2684FF" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M20 40 Q15 50, 20 60" stroke="#2684FF" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
