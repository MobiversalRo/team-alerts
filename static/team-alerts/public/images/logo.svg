<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="48" height="48">
  <defs>
    <linearGradient id="alertGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2684FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bell body -->
  <path d="M50 20 C40 20, 35 25, 35 35 L35 55 C35 60, 30 62, 28 65 L72 65 C70 62, 65 60, 65 55 L65 35 C65 25, 60 20, 50 20 Z" 
        fill="url(#alertGradient)" stroke="#0052CC" stroke-width="2"/>
  
  <!-- Bell clapper -->
